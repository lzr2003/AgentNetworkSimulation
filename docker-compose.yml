# 启动: docker compose up -d --build

x-brain: &brain
  build: { context: ., dockerfile: Dockerfile }
  cap_add: [NET_RAW, NET_ADMIN]
  environment:
    TZ: Asia/Shanghai
    AGENT_BACKEND: brain
    MESSAGE_BUS_URL: http://bus:9000
    SERVER_URL: http://srv:8000
    LOG_DOCKER_HTTP: "0"
    LOG_TRAFFIC: "0"
    LOG_LLM_API: "1"
    LLM_API_KEY: ${ANTHROPIC_API_KEY}
    LLM_MODEL: deepseek-chat
    LLM_API_BASE: https://api.deepseek.com/v1
    LLM_PROVIDER: openai
    ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
    ANTHROPIC_BASE_URL: https://api.deepseek.com/anthropic
    AGENT_MESSAGE_HISTORY_TURNS: ${AGENT_MESSAGE_HISTORY_TURNS:-8}
    AGENT_RECENT_HISTORY_TURNS: ${AGENT_RECENT_HISTORY_TURNS:-2}
    AGENT_FACT_BOARD_MAX_ITEMS: ${AGENT_FACT_BOARD_MAX_ITEMS:-40}
    AGENT_FACT_BOARD_MAX_CHARS: ${AGENT_FACT_BOARD_MAX_CHARS:-6000}
    AGENT_FACT_ITEM_MAX_CHARS: ${AGENT_FACT_ITEM_MAX_CHARS:-300}
  volumes: ["./agent_server.py:/app/agent_server.py", "./agent_network:/app/agent_network"]
  restart: unless-stopped
  networks: [an]

