# ============================================
# AgentNetwork — Docker Compose 编排
# ============================================
# 启动方式:
#   docker-compose up -d                  # 后台启动全部服务
#   docker-compose up -d message-bus      # 单独启动消息总线
#   docker-compose logs -f agent-claude   # 查看 Claude Agent 日志
#
# 注意: 在 Linux 上使用 service name 互访 (如 message-bus:9000)
#       不需要 host.docker.internal (仅 Docker Desktop 支持)
# ============================================

version: "3.9"

services:
  # ── 消息总线 (端口 9000) ──
  message-bus:
    build:
      context: .
      dockerfile: Dockerfile.message-bus
    container_name: an-message-bus
    ports:
      - "9000:9000"
    environment:
      - MESSAGE_BUS_PORT=9000
    restart: unless-stopped
    networks:
      - agent-network

  # ── 主调度中心 / Web API (端口 8000) ──
  server:
    build:
      context: .
      dockerfile: Dockerfile.server
    container_name: an-server
    ports:
      - "8000:8000"
    environment:
      - SERVER_PORT=8000
      - MESSAGE_BUS_URL=http://message-bus:9000
    depends_on:
      - message-bus
    restart: unless-stopped
    networks:
      - agent-network

  # ── Agent 容器 (Python 通用版) ──
  agent-server:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: an-agent
    environment:
      - AGENT_ID=agent-001
      - AGENT_ROLE=generic
      - AGENT_NAME=Generic Agent
      - MESSAGE_BUS_URL=http://message-bus:9000
      - SERVER_URL=http://server:8000
    depends_on:
      - message-bus
      - server
    restart: unless-stopped
    networks:
      - agent-network

  # ── Agent 容器 (Claude Code 版) ──
  agent-claude:
    build:
      context: .
      dockerfile: Dockerfile.claude
    container_name: an-agent-claude
    environment:
      - AGENT_ID=agent-claude-001
      - AGENT_ROLE=claude
      - AGENT_NAME=Claude Code Agent
      - PORT=8001
      - MESSAGE_BUS_URL=http://message-bus:9000
      - SERVER_URL=http://server:8000
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
    depends_on:
      - message-bus
      - server
    restart: unless-stopped
    networks:
      - agent-network

  # ── Agent 容器 (OpenClaw 版) ──
  agent-openclaw:
    build:
      context: .
      dockerfile: Dockerfile.openclaw
    container_name: an-agent-openclaw
    environment:
      - AGENT_ID=agent-openclaw-001
      - AGENT_ROLE=openclaw
      - AGENT_NAME=OpenClaw Agent
      - PORT=8002
      - MESSAGE_BUS_URL=http://message-bus:9000
      - SERVER_URL=http://server:8000
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
    depends_on:
      - message-bus
      - server
    restart: unless-stopped
    networks:
      - agent-network

networks:
  agent-network:
    driver: bridge
    name: agent-network
