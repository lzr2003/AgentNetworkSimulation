services:
  bus:
    build: { context: ., dockerfile: Dockerfile.message-bus }
    container_name: bus
    user: "1000:1000"
    ports: ["9000:9000"]
    volumes: ["./data/logs:/app/data/logs"]
    environment: { TZ: "Asia/Shanghai", MESSAGE_BUS_PORT: "9000", SERVER_URL: "http://srv:8000", LOG_DOCKER_HTTP: "0", LOG_TRAFFIC: "0", LOG_LLM_API: "1" }
    restart: unless-stopped
    networks: [an]

  srv:
    build: { context: ., dockerfile: Dockerfile.server }
    container_name: srv
    user: "1000:110"
    ports: ["8000:8000"]
    command: ["python", "server.py", "--host", "0.0.0.0"]
    volumes: ["/var/run/docker.sock:/var/run/docker.sock", "./data/logs:/app/data/logs", "./web/public:/app/web/public", "./scenes:/app/scenes", "./server.py:/app/server.py", "./agent_server.py:/app/agent_server.py", "./agent_network:/app/agent_network"]
    environment:
      TZ: Asia/Shanghai
      SERVER_PORT: "8000"
      MESSAGE_BUS_URL: http://bus:9000
      LOG_DOCKER_HTTP: "0"
      LOG_TRAFFIC: "0"
      LOG_LLM_API: "1"
      LLM_API_KEY: ${ANTHROPIC_API_KEY}
      LLM_MODEL: deepseek-chat
      LLM_API_BASE: https://api.deepseek.com/v1
      LLM_PROVIDER: openai
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      ANTHROPIC_BASE_URL: https://api.deepseek.com/anthropic
      AGENT_MESSAGE_HISTORY_TURNS: ${AGENT_MESSAGE_HISTORY_TURNS:-8}
      AGENT_RECENT_HISTORY_TURNS: ${AGENT_RECENT_HISTORY_TURNS:-2}
      AGENT_FACT_BOARD_MAX_ITEMS: ${AGENT_FACT_BOARD_MAX_ITEMS:-40}
      AGENT_FACT_BOARD_MAX_CHARS: ${AGENT_FACT_BOARD_MAX_CHARS:-6000}
      AGENT_FACT_ITEM_MAX_CHARS: ${AGENT_FACT_ITEM_MAX_CHARS:-300}
    restart: unless-stopped
    networks: [an]

networks:
  an: { driver: bridge, name: an }
