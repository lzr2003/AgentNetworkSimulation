# 启动: docker compose up -d --build

x-brain: &brain
  build: { context: ., dockerfile: Dockerfile }
  environment:
    TZ: Asia/Shanghai
    AGENT_BACKEND: brain
    MESSAGE_BUS_URL: http://bus:9000
    SERVER_URL: http://srv:8000
    LLM_API_KEY: ${ANTHROPIC_API_KEY}
    LLM_MODEL: deepseek-chat
    LLM_API_BASE: https://api.deepseek.com/v1
    LLM_PROVIDER: openai
  restart: unless-stopped
  networks: [an]

x-claude: &claude
  build: { context: ., dockerfile: Dockerfile.claude }
  environment:
    TZ: Asia/Shanghai
    AGENT_BACKEND: claude-code
    MESSAGE_BUS_URL: http://bus:9000
    SERVER_URL: http://srv:8000
    LLM_API_KEY: ${ANTHROPIC_API_KEY}
    LLM_MODEL: deepseek-chat
    ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
    ANTHROPIC_BASE_URL: https://api.deepseek.com/anthropic
  restart: unless-stopped
  networks: [an]

x-openclaw: &openclaw
  build: { context: ., dockerfile: Dockerfile.openclaw }
  environment:
    TZ: Asia/Shanghai
    AGENT_BACKEND: openclaw
    MESSAGE_BUS_URL: http://bus:9000
    SERVER_URL: http://srv:8000
    LLM_API_KEY: ${ANTHROPIC_API_KEY}
    LLM_MODEL: deepseek-chat
    LLM_API_BASE: https://api.deepseek.com/v1
    LLM_PROVIDER: openai
    ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
    ANTHROPIC_BASE_URL: https://api.deepseek.com/anthropic
  restart: unless-stopped
  networks: [an]

services:
  bus:
    build: { context: ., dockerfile: Dockerfile.message-bus }
    container_name: bus
    ports: ["9000:9000"]
    volumes: ["./data/logs:/app/data/logs"]
    environment: { TZ: "Asia/Shanghai", MESSAGE_BUS_PORT: "9000" }
    restart: unless-stopped
    networks: [an]

  srv:
    build: { context: ., dockerfile: Dockerfile.server }
    container_name: srv
    ports: ["8000:8000"]
    volumes: ["/var/run/docker.sock:/var/run/docker.sock", "./data/logs:/app/data/logs"]
    environment:
      TZ: Asia/Shanghai
      SERVER_PORT: "8000"
      MESSAGE_BUS_URL: http://bus:9000
      LLM_API_KEY: ${ANTHROPIC_API_KEY}
      LLM_MODEL: deepseek-chat
      LLM_API_BASE: https://api.deepseek.com/v1
      LLM_PROVIDER: openai
    restart: unless-stopped
    networks: [an]

  ag-b1: { <<: *brain, container_name: ag-b1 }
  ag-b2: { <<: *brain, container_name: ag-b2 }
  ag-b3: { <<: *brain, container_name: ag-b3 }
  ag-b4: { <<: *brain, container_name: ag-b4 }

  ag-c1: { <<: *claude, container_name: ag-c1 }
  ag-c2: { <<: *claude, container_name: ag-c2 }
  ag-c3: { <<: *claude, container_name: ag-c3 }

  ag-o1: { <<: *openclaw, container_name: ag-o1 }
  ag-o2: { <<: *openclaw, container_name: ag-o2 }
  ag-o3: { <<: *openclaw, container_name: ag-o3 }
  ag-o4: { <<: *openclaw, container_name: ag-o4 }
  ag-o5: { <<: *openclaw, container_name: ag-o5 }
  ag-o6: { <<: *openclaw, container_name: ag-o6 }
  ag-o7: { <<: *openclaw, container_name: ag-o7 }
  ag-o8: { <<: *openclaw, container_name: ag-o8 }
  ag-o9: { <<: *openclaw, container_name: ag-o9 }

networks:
  an: { driver: bridge, name: an }
