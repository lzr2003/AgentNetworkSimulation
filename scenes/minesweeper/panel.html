<!DOCTYPE html>
<html><head><meta charset="UTF-8"><style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:#ECE8DF;font-family:Inter,system-ui,sans-serif;color:#2A2A2A}
body{display:flex;flex-direction:column;padding:4px 6px}
h3{font-size:11px;color:#6A665F;text-align:center;flex-shrink:0}
.board-wrap{display:flex;align-items:center;justify-content:center;position:relative}
.grid{display:grid;grid-template-columns:repeat(9,24px);grid-template-rows:repeat(9,24px);gap:1px;background:#B0A89A;border:1px solid #B0A89A;border-radius:2px;overflow:hidden}
.cell{display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:700;position:relative;transition:background 0.3s}
.cell.mine{background:#C0392B;font-size:14px}
.cell.unknown{background:#8B8475}
.cell.safe-0{background:#C8D6B8}.cell.safe-1{background:#A8C09A;color:#2A5A2A}
.cell.safe-2{background:#8CB07A;color:#1A4A1A}.cell.safe-3{background:#D4A860;color:#5A3A10}
.cell.safe-4{background:#C08040;color:#FFF}.cell.safe-5{background:#B04030;color:#FFF}
.cell.safe-6{background:#902020;color:#FFF}.cell.safe-7{background:#701010;color:#FFF}
.cell.safe-8{background:#500000;color:#FFF}
.soldier-dot{position:absolute;right:1px;bottom:1px;width:10px;height:10px;border-radius:50%;border:1px solid #FFF;box-shadow:0 1px 2px rgba(0,0,0,0.3);z-index:2;pointer-events:none;display:flex;align-items:center;justify-content:center}
.soldier-dot .slabel{font-size:5px;color:#FFF;font-weight:700;text-shadow:0 0 2px rgba(0,0,0,0.5)}
.status{font-size:10px;color:#6A665F;text-align:center;margin-top:3px;flex-shrink:0;line-height:1.3}
.legend{display:flex;gap:6px;justify-content:center;font-size:10px;color:#6A665F;margin-top:2px;flex-shrink:0;flex-wrap:wrap}
.legend span{display:flex;align-items:center;gap:3px}
.ldot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
</style></head>
<body>
<h3>扫雷 9×9</h3>
<div class="board-wrap">
  <div class="grid" id="grid"></div>
</div>
<div class="status" id="status">等待仿真开始...</div>
<div class="legend">
  <span><span class="ldot" style="background:#8B8475"></span>未探</span>
  <span><span class="ldot" style="background:#C8D6B8"></span>安全</span>
  <span><span class="ldot" style="background:#C0392B"></span>地雷</span>
  <span>数字=相邻雷数</span>
</div>
<script>
const API = '/api';
const SIZE = 9;
const SOLDIER_COLORS = ['#5A7A9A','#6B8A5E','#B8783A','#7A6A8A','#C0392B','#2E86C1','#D4AC0D','#1ABC9C','#E67E22'];

function createGrid() {
  const g = document.getElementById('grid');
  g.innerHTML = '';
  for (let r = 0; r < SIZE; r++) {
    for (let c = 0; c < SIZE; c++) {
      const cell = document.createElement('div');
      cell.className = 'cell unknown';
      cell.id = 'c' + r + '_' + c;
      g.appendChild(cell);
    }
  }
}

function updateBoard(data) {
  if (!data || !data.board) return;
  for (let r = 0; r < SIZE; r++) {
    for (let c = 0; c < SIZE; c++) {
      const cell = document.getElementById('c' + r + '_' + c);
      if (!cell) continue;
      const val = data.board[r]?.[c];
      cell.querySelectorAll('.soldier-dot').forEach(d => d.remove());
      cell.className = 'cell';
      cell.textContent = '';
      if (val === -1) {
        cell.className = 'cell mine';
        cell.textContent = '💣';
      } else if (val !== null && val !== undefined) {
        cell.className = 'cell safe-' + Math.min(val, 8);
        if (val > 0) cell.textContent = val;
      } else {
        cell.className = 'cell unknown';
      }
    }
  }
  document.getElementById('status').textContent =
    (data.game_state || '') + ' | 已揭示: ' + (data.cells_revealed || 0) +
    ' | ' + (data.completion_percentage || '0%');
}

function placeSoldiers(soldiers) {
  if (!soldiers) return;
  const entries = Object.entries(soldiers);
  entries.forEach(([sid, pos], i) => {
    if (pos.x == null || pos.y == null) return;
    const col = pos.x;
    const row = pos.y;
    if (col < 0 || col >= SIZE || row < 0 || row >= SIZE) return;
    const cell = document.getElementById('c' + row + '_' + col);
    if (!cell) return;
    // 不重复创建同一士兵的棋子
    const existing = cell.querySelector('.soldier-dot[data-sid="' + sid + '"]');
    if (existing) return;
    const dot = document.createElement('div');
    dot.className = 'soldier-dot';
    dot.style.background = SOLDIER_COLORS[i % SOLDIER_COLORS.length];
    dot.title = sid;
    dot.setAttribute('data-sid', sid);
    const label = document.createElement('span');
    label.className = 'slabel';
    label.textContent = sid.replace('soldier_', '');
    dot.appendChild(label);
    cell.appendChild(dot);
  });
}

async function poll() {
  try {
    const br = await fetch(API + '/minesweeper/board');
    if (br.ok) {
      const data = await br.json();
      updateBoard(data);
      placeSoldiers(data.soldiers);
    }
  } catch(e) {}
}

createGrid();
setInterval(poll, 2000);
poll();
</script>
</body>
</html>
