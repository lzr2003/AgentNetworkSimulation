<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Agent 仿真运行平台</title>
<link rel="stylesheet" href="/static/dashboard.css?v=3">
</head>
<body>
<div class="app cockpit-shell">
<div class="main-workspace">
<div class="canvas-panel" id="canvas-panel">
<div class="scene-panel" id="scene-panel">
  <div class="scene-header">
    <span class="scene-kicker">MISSION VISUAL // SCENE FEED</span>
    <span class="scene-title" id="fp-title">场景面板</span>
    <button class="icon-btn" onclick="toggleScenePanel()" title="折叠场景面板">_</button>
  </div>
  <iframe id="fp-iframe" src="about:blank"></iframe>
</div>
<div class="canvas-stage" id="canvas-stage">
  <div class="stage-frame stage-frame-tl"></div>
  <div class="stage-frame stage-frame-tr"></div>
  <div class="stage-frame stage-frame-bl"></div>
  <div class="stage-frame stage-frame-br"></div>
  <div class="stage-hud stage-hud-top">AGENT TACTICAL MAP // BLUE FORCE NETWORK</div>
  <div class="stage-hud stage-hud-bottom">SIGNAL RELAY // LINK PULSE ANALYSIS</div>
  <canvas id="agent-canvas"></canvas>
  <div class="tooltip" id="tooltip"></div>
</div>
</div>
<div class="side-panel">
<div class="section-title control-bar">
  <span class="control-label">MISSION CTRL</span>
  <select id="scene-selector" class="scene-select" onchange="onSceneSelect()">
      </select>
  <button class="btn green run-btn" onclick="runSelectedScene()">运行</button>
  <button class="btn red stop-btn" onclick="stopSimulation()">停止</button>
</div>
<div class="section-title">战报日志 <span class="toggle" onclick="togglePanel('log-viewer')">_</span></div>
<div class="log-viewer" id="log-viewer">
<div class="log-controls">
<div class="log-dropdown" id="log-dropdown">
<button class="log-dropdown-btn" onclick="document.getElementById('log-dropdown').classList.toggle('open')">频道 ▾</button>
<div class="log-dropdown-menu" id="log-fields">
<label class="chk"><input type="checkbox" data-field="frontend" checked onchange="renderLogs()">前端</label>
<label class="chk"><input type="checkbox" data-field="scene" checked onchange="renderLogs()">场景</label>
<label class="chk"><input type="checkbox" data-field="agent" checked onchange="renderLogs()">Agent</label>
<label class="chk"><input type="checkbox" data-field="message" checked onchange="renderLogs()">消息</label>
<label class="chk"><input type="checkbox" data-field="llm_api" checked onchange="renderLogs()">LLM</label>
<label class="chk"><input type="checkbox" data-field="network_capture" checked onchange="renderLogs()">CAP</label>
<label class="chk"><input type="checkbox" data-field="system" checked onchange="renderLogs()">系统</label>
</div>
</div>
<label class="chk"><input type="checkbox" id="log-autoscroll" checked>自动</label>
<button class="btn ghost" onclick="clearLogs()">清空</button>
<span class="log-count" id="log-count">0</span>
</div>
<div class="log-entries" id="log-entries"><div class="log-entry"><span class="ts">--</span> <span class="lv lv-L1">就绪</span> <span class="ev">等待仿真启动...</span></div></div>
</div>
</div>
</div>
<div class="token-chart-panel">
  <div class="token-chart-header">
    <div>
      <span class="token-chart-kicker">TOKEN CACHE MONITOR</span>
      <span class="token-chart-title">SESSION TOKEN STACKED TREND</span>
    </div>
    <div class="token-stats">
      <div class="token-stat"><span>HIT</span><strong id="token-hit-total">0</strong></div>
      <div class="token-stat miss"><span>MISS</span><strong id="token-miss-total">0</strong></div>
      <div class="token-stat output"><span>OUTPUT</span><strong id="token-output-total">0</strong></div>
      <div class="token-stat"><span>RATIO</span><strong id="token-hit-ratio">0%</strong></div>
    </div>
  </div>
  <div class="token-chart-canvas-wrap">
    <canvas id="token-chart"></canvas>
  </div>
</div>
</div>
<script src="/static/dashboard.js?v=11"></script>
</body>
</html>
