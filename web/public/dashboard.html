<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Agent 仿真运行平台</title>
<link rel="stylesheet" href="/static/dashboard.css">
</head>
<body>
<div class="app">
<div class="canvas-panel" id="canvas-panel">
<div class="canvas-stage" id="canvas-stage">
  <div class="stage-hud stage-hud-top">AGENT NETWORK // LIVE TOPOLOGY</div>
  <div class="stage-hud stage-hud-bottom">SIGNAL BUS // ACTIVE LINK ANALYSIS</div>
  <canvas id="agent-canvas"></canvas>
  <div class="tooltip" id="tooltip"></div>
</div>
<div class="scene-panel" id="scene-panel">
  <div class="scene-header">
    <span class="scene-kicker">SCENE FEED</span>
    <span class="scene-title" id="fp-title">场景面板</span>
    <button class="icon-btn" onclick="toggleScenePanel()" title="折叠场景面板">_</button>
  </div>
  <iframe id="fp-iframe" src="about:blank"></iframe>
</div>
</div>
<div class="side-panel">
<div class="section-title control-bar">
  <select id="scene-selector" class="scene-select" onchange="onSceneSelect()">
      </select>
  <button class="btn green run-btn" onclick="runSelectedScene()">运行</button>
  <button class="btn red stop-btn" onclick="stopSimulation()">停止</button>
</div>
<div class="section-title">仿真日志 <span class="toggle" onclick="togglePanel('log-viewer')">_</span></div>
<div class="log-viewer" id="log-viewer">
<div class="log-controls">
<div class="log-dropdown" id="log-dropdown">
<button class="log-dropdown-btn" onclick="document.getElementById('log-dropdown').classList.toggle('open')">日志 ▾</button>
<div class="log-dropdown-menu" id="log-fields">
<label class="chk"><input type="checkbox" data-field="frontend" checked onchange="renderLogs()">前端</label>
<label class="chk"><input type="checkbox" data-field="scene" checked onchange="renderLogs()">场景</label>
<label class="chk"><input type="checkbox" data-field="agent" checked onchange="renderLogs()">Agent</label>
<label class="chk"><input type="checkbox" data-field="message" checked onchange="renderLogs()">消息</label>
<label class="chk"><input type="checkbox" data-field="system" checked onchange="renderLogs()">系统</label>
</div>
</div>
<label class="chk"><input type="checkbox" id="log-autoscroll" checked>自动</label>
<button class="btn ghost" onclick="clearLogs()">清空</button>
<span class="log-count" id="log-count">0</span>
</div>
<div class="log-entries" id="log-entries"><div class="log-entry"><span class="ts">--</span> <span class="lv lv-L1">就绪</span> <span class="ev">等待仿真启动...</span></div></div>
</div>
</div>
</div>
<script src="/static/dashboard.js?v=4"></script>
</body>
</html>
