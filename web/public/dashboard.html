<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Agent 仿真运行平台</title>
<link rel="stylesheet" href="/static/dashboard.css">
</head>
<body>
<div class="app">
<div class="canvas-panel" id="canvas-panel">
<canvas id="agent-canvas"></canvas>
<div class="float-panel" id="float-panel">
  <div class="fp-header">
    <span class="fp-title" id="fp-title">场景面板</span>
    <span class="fp-close" onclick="toggleFloatPanel()" title="折叠">_</span>
  </div>
  <iframe id="fp-iframe" src="about:blank"></iframe>
</div>
<div class="tooltip" id="tooltip"></div>
</div>
<div class="side-panel">
<div class="section-title">
  <select id="scene-selector" onchange="onSceneSelect()" style="background:var(--bg);color:var(--text);border:1px solid var(--border);padding:2px 6px;border-radius:3px;font-size:0.7rem;width:150px">
      </select>
  <button class="btn green" onclick="runSelectedScene()" style="margin-left:6px;font-size:0.7rem;padding:3px 10px">运行</button>
  <span class="toggle" onclick="togglePanel('script-editor')" style="margin-left:auto">_</span>
</div>
<div class="script-editor" id="script-editor" style="display:none"></div>
<div class="section-title">仿真日志 <span class="toggle" onclick="togglePanel('log-viewer')">_</span></div>
<div class="log-viewer" id="log-viewer">
<div class="log-controls">
<div class="log-dropdown" id="log-dropdown">
<button class="log-dropdown-btn" onclick="document.getElementById('log-dropdown').classList.toggle('open')">日志 ▾</button>
<div class="log-dropdown-menu" id="log-fields" style="display:none;flex-direction:column;gap:4px;position:absolute;top:100%;left:0;background:var(--bg);border:1px solid var(--border);padding:6px 10px;border-radius:4px;z-index:10;min-width:100px">
<label class="chk"><input type="checkbox" data-field="frontend" checked onchange="renderLogs()">前端</label>
<label class="chk"><input type="checkbox" data-field="scene" checked onchange="renderLogs()">场景</label>
<label class="chk"><input type="checkbox" data-field="agent" checked onchange="renderLogs()">Agent</label>
<label class="chk"><input type="checkbox" data-field="message" checked onchange="renderLogs()">消息</label>
<label class="chk"><input type="checkbox" data-field="system" checked onchange="renderLogs()">系统</label>
</div>
</div>
<label class="chk"><input type="checkbox" id="log-autoscroll" checked>自动</label>
<button class="btn ghost" onclick="clearLogs()">清空</button>
<span style="font-size:0.65rem;color:var(--gray);margin-left:auto" id="log-count">0</span>
</div>
<div class="log-entries" id="log-entries"><div class="log-entry"><span class="ts">--</span> <span class="lv lv-L1">就绪</span> <span class="ev">等待仿真启动...</span></div></div>
</div>
</div>
</div>
<script src="/static/dashboard.js?v=3"></script>
</body>
</html>
